name: whatsapp_cloud_flutter
description: A comprehensive Flutter package that provides a type-safe, easy-to-use wrapper around Meta's WhatsApp Cloud API.
version: 1.0.0
homepage: https://github.com/swahiliconnect/whatsapp_cloud_flutter
repository: https://github.com/swahiliconnect/whatsapp_cloud_flutter
issue_tracker: https://github.com/swahiliconnect/whatsapp_cloud_flutter/issues
documentation: https://github.com/swahiliconnect/whatsapp_cloud_flutter/wiki

environment:
  sdk: ">=2.17.0 <3.0.0"
  flutter: ">=2.5.0"

dependencies:
  flutter:
    sdk: flutter
  http: ^0.13.5
  dio: ^5.0.0
  logger: ^1.1.0
  shared_preferences: ^2.0.15
  meta: ^1.8.0
  path: ^1.8.2
  equatable: ^2.0.5
  json_annotation: ^4.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  build_runner: ^2.3.0
  json_serializable: ^6.5.0
  mockito: ^5.3.2
  flutter_lints: ^2.0.1
  test: ^1.21.4
  
flutter:
  # This section identifies this Flutter package as a plugin package.
  # plugin:
  #   platforms:
  #     android:
  #       package: com.swahiliconnect.whatsapp_cloud_flutter
  #       pluginClass: WhatsappCloudFlutterPlugin
  #     ios:
  #       pluginClass: WhatsappCloudFlutterPlugin

topics:
  - whatsapp
  - messaging
  - api-wrapper
  - cloud-api